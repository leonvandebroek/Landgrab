version: '3.9'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Dev_Password1!"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Dev_Password1!' -Q 'SELECT 1' -No -b"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend/Landgrab.Api
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=db,1433;Initial Catalog=landgrab;User Id=sa;Password=Dev_Password1!;Encrypt=False;TrustServerCertificate=True;
      - Jwt__Secret=${JWT_SECRET:?JWT_SECRET environment variable must be set}
      - App__BaseUrl=${APP_URL:-http://localhost}
      - AllowedOrigins__0=http://localhost
    ports:
      - "7000:8080"

  frontend:
    build:
      context: ./frontend/landgrab-ui
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  sqldata:
