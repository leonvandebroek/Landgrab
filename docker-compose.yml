version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: landgrab
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend/Landgrab.Api
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Database=landgrab;Username=postgres;Password=postgres
      - Jwt__Secret=${JWT_SECRET:?JWT_SECRET environment variable must be set}
      - App__BaseUrl=${APP_URL:-http://localhost}
      - AllowedOrigins__0=http://localhost
    ports:
      - "7000:8080"

  frontend:
    build:
      context: ./frontend/landgrab-ui
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
