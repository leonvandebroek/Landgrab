name: CI

on:
  push:
    branches: [main, master, 'claude/**']
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore backend/Landgrab.Api/Landgrab.Api.csproj

      - name: Build
        run: dotnet build backend/Landgrab.Api/Landgrab.Api.csproj --no-restore -c Release

  frontend:
    name: Frontend Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/landgrab-ui/package-lock.json

      - name: Install
        run: npm ci
        working-directory: frontend/landgrab-ui

      - name: Type check
        run: npx tsc --noEmit
        working-directory: frontend/landgrab-ui

      - name: Build
        run: npm run build
        working-directory: frontend/landgrab-ui

  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t landgrab-api ./backend/Landgrab.Api

      - name: Build frontend image
        run: docker build -t landgrab-ui ./frontend/landgrab-ui
