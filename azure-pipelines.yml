trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

variables:
  buildConfiguration: 'Release'
  dotnetVersion: '8.x'
  nodeVersion: '20.x'
  azureServiceConnection: 'Azure-LandGrab-SC'
  resourceGroupName: 'rg-landgrab-prod'
  appServiceName: 'app-landgrab-prod'
  azureRegion: 'westeurope'

stages:
  # ────────────────────────────────────────────
  # Stage 1: Build (PR + main)
  # ────────────────────────────────────────────
  - stage: Build
    displayName: 'Build & Package'
    jobs:
      - job: BuildJob
        displayName: 'Build Backend + Frontend'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: UseDotNet@2
            displayName: 'Install .NET SDK'
            inputs:
              packageType: 'sdk'
              version: '$(dotnetVersion)'

          - task: NodeTool@0
            displayName: 'Install Node.js'
            inputs:
              versionSpec: '$(nodeVersion)'

          # Backend
          - script: dotnet restore
            displayName: 'Restore NuGet packages'
            workingDirectory: backend/Landgrab.Api

          - script: dotnet list package --vulnerable --include-transitive
            displayName: 'Backend - NuGet Vulnerability Scan'
            workingDirectory: backend/Landgrab.Api
            continueOnError: true

          - script: dotnet build -c $(buildConfiguration) --no-restore
            displayName: 'Build backend'
            workingDirectory: backend/Landgrab.Api

          - script: dotnet test backend/Landgrab.Tests/Landgrab.Tests.csproj --configuration Release --verbosity normal --filter "Category!=E2E" --logger trx --results-directory $(Build.ArtifactStagingDirectory)/test-results
            displayName: 'Run Tests'

          - task: PublishTestResults@2
            displayName: 'Publish Test Results'
            inputs:
              testResultsFormat: 'VSTest'
              testResultsFiles: '$(Build.ArtifactStagingDirectory)/test-results/**/*.trx'
              mergeTestResults: true
            condition: succeededOrFailed()

          # Frontend
          - script: npm ci
            displayName: 'Install frontend dependencies'
            workingDirectory: frontend/landgrab-ui

          - script: npm audit --audit-level=high
            displayName: 'Frontend - Security Audit'
            workingDirectory: frontend/landgrab-ui
            continueOnError: true

          - script: npm run build
            displayName: 'Build frontend'
            workingDirectory: frontend/landgrab-ui

          - script: npm run lint
            displayName: 'Lint frontend'
            workingDirectory: frontend/landgrab-ui

          # Copy SPA into backend wwwroot
          - script: |
              mkdir -p backend/Landgrab.Api/wwwroot
              cp -r frontend/landgrab-ui/dist/* backend/Landgrab.Api/wwwroot/
            displayName: 'Copy SPA to wwwroot'

          # Publish
          - script: dotnet publish -c $(buildConfiguration) -o $(Build.ArtifactStagingDirectory)/app
            displayName: 'Publish backend'
            workingDirectory: backend/Landgrab.Api

          # Upload artifacts
          - publish: $(Build.ArtifactStagingDirectory)/app
            artifact: drop
            displayName: 'Upload build artifact'

          - publish: infrastructure
            artifact: infra
            displayName: 'Upload infrastructure artifact'

  # ────────────────────────────────────────────
  # Stage 2: Deploy (main branch only)
  # ────────────────────────────────────────────
  - stage: Deploy
    displayName: 'Deploy to Azure'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployProduction
        displayName: 'Deploy to Production'
        environment: 'production'
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                # Deploy infrastructure
                - task: AzureResourceManagerTemplateDeployment@3
                  displayName: 'Deploy Bicep infrastructure'
                  inputs:
                    deploymentScope: 'Resource Group'
                    azureResourceManagerConnection: '$(azureServiceConnection)'
                    action: 'Create Or Update Resource Group'
                    resourceGroupName: '$(resourceGroupName)'
                    location: '$(azureRegion)'
                    templateLocation: 'Linked artifact'
                    csmFile: '$(Pipeline.Workspace)/infra/main.bicep'
                    csmParametersFile: '$(Pipeline.Workspace)/infra/parameters.prod.json'
                    overrideParameters: '-sqlAdminPassword "$(SQL_ADMIN_PASSWORD)" -jwtSecret "$(JWT_SECRET)"'
                    deploymentMode: 'Incremental'

                # Deploy application
                - task: AzureWebApp@1
                  displayName: 'Deploy to App Service'
                  inputs:
                    azureSubscription: '$(azureServiceConnection)'
                    appType: 'webAppLinux'
                    appName: '$(appServiceName)'
                    package: '$(Pipeline.Workspace)/drop'
                    runtimeStack: 'DOTNETCORE|8.0'
